<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص الاتصال</title>
    <style>body{font-family:sans-serif; text-align:center; padding:50px;}</style>
</head>
<body>
    <div id="status">جاري الاتصال وفحص البيانات...</div>
    <input type="text" id="user" placeholder="اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button onclick="login()">فحص الدخول</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
            projectId: "al-nas-lil-nas",
            storageBucket: "al-nas-lil-nas.firebasestorage.app",
            messagingSenderId: "134740212500",
            appId: "1:134740212500:web:af95ff96b87bd6b2f66001"
        }));

        window.login = async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const statusDiv = document.getElementById('status');
            
            try {
                const snapshot = await getDocs(collection(db, "users"));
                snapshot.forEach((doc) => {
                    const d = doc.data();
                    const dbU = (d.username || d.Username || "").trim();
                    const dbP = (d.password || d.Password || "").trim();
                    
                    statusDiv.innerHTML = `تم العثور على: <br>اسم المستخدم في القاعدة: "${dbU}"<br>كلمة المرور في القاعدة: "${dbP}"`;
                    
                    if (dbU === u && dbP === p) {
                        statusDiv.innerHTML += "<br><h2 style='color:green'>تطابق تام! الدخول مسموح</h2>";
                    }
                });
            } catch (e) {
                statusDiv.innerText = "خطأ: " + e.message;
            }
        };
    </script>
</body>
</html>
