<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناس للناس - لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background: var(--light); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #app { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>الناس للناس</h1>
        <p>لوحة تحكم الإدارة</p>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="login()">دخول</button>
    </div>

    <div id="app" class="card">
        <h1>تم الدخول بنجاح!</h1>
        <p>أهلاً بك في لوحة التحكم.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
            authDomain: "al-nas-lil-nas.firebaseapp.com",
            projectId: "al-nas-lil-nas",
            storageBucket: "al-nas-lil-nas.firebasestorage.app",
            messagingSenderId: "134740212500",
            appId: "1:134740212500:web:af95ff96b87bd6b2f66001"
        }));

        window.login = async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            
            try {
                // جلب جميع المستندات من مجموعة 'users'
                const snapshot = await getDocs(collection(db, "users"));
                let authenticated = false;

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    // فحص مرن جداً (يدعم اسم الحقل بحرف كبير أو صغير)
                    const dbUser = data.username || data.Username;
                    const dbPass = data.password || data.Password;

                    if (dbUser === u && dbPass === p) {
                        authenticated = true;
                    }
                });

                if (authenticated) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                } else {
                    alert("بيانات خاطئة! يرجى التأكد من اسم المستخدم وكلمة المرور.");
                }
            } catch (e) {
                console.error(e);
                alert("حدث خطأ في الاتصال بقاعدة البيانات. تأكد من إعداداتك.");
            }
        };
    </script>
</body>
</html>
