<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناس للناس | الإدارة الاحترافية</title>
    <!-- المكتبات الاحترافية -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a2a6c; --danger: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); margin: 0; }
        .header { background: linear-gradient(135deg, var(--primary), #b21f1f); color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 10px auto; padding: 0 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; margin: 5px; }
        .btn-main { background: var(--primary); }
        .btn-del { background: var(--danger); }
        #app { display: none; }
        
        @media print { .btn, .header, aside, .card h3, .card:nth-child(1) { display: none !important; } }
    </style>
</head>
<body>

<div class="header"><h1>مؤسسة الناس للناس</h1><p>تطوير/ حسن الدربي</p></div>

<div class="container">
    <!-- تسجيل الدخول -->
    <div id="loginScreen" class="card" style="max-width: 400px; margin: auto;">
        <h3>دخول الإدارة</h3>
        <input type="text" id="user" placeholder="اسم المستخدم" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
        <input type="password" id="pass" placeholder="كلمة المرور" style="width:100%; padding:10px; margin:5px 0; border:1px solid #ddd; border-radius:8px;">
        <button class="btn btn-main" style="width:100%" onclick="login()">دخول إلى النظام</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="app" class="grid">
        <aside>
            <div class="card">
                <h3>المؤشرات المالية</h3>
                <canvas id="myChart"></canvas>
                <h2 id="balance" style="text-align:center; color: var(--primary);">0</h2>
            </div>
        </aside>
        <main>
            <div class="card">
                <h3>إضافة حركة مالية</h3>
                <input type="text" id="cName" placeholder="اسم الحالة" style="width:100%; padding:10px; margin:5px 0;">
                <input type="number" id="amount" placeholder="المبلغ" style="width:100%; padding:10px; margin:5px 0;">
                <select id="type" style="width:100%; padding:10px; margin:5px 0;">
                    <option value="in">تبرع (وارد)</option><option value="out">صرف (صادر)</option>
                </select>
                <button class="btn btn-main" style="width:100%" onclick="saveData()">حفظ العملية</button>
            </div>
            <div class="card">
                <button class="btn btn-main" onclick="exportExcel()">Excel</button>
                <button class="btn btn-main" style="background:#2c3e50" onclick="window.print()">طباعة السجل</button>
                <table id="financeTable">
                    <thead><tr><th>الاسم</th><th>المبلغ</th><th>النوع</th><th>إجراء</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
        projectId: "al-nas-lil-nas",
        storageBucket: "al-nas-lil-nas.firebasestorage.app",
        messagingSenderId: "134740212500",
        appId: "1:134740212500:web:af95ff96b87bd6b2f66001"
    }));

    let myChart = null;

    window.login = async () => {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value.trim();
        const snap = await getDocs(collection(db, "users"));
        let auth = false;
        snap.forEach(d => { if(d.data().username === u && d.data().password === p) auth = true; });
        if(auth) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            loadData();
        } else { Swal.fire('خطأ', 'بيانات الدخول غير صحيحة', 'error'); }
    };

    window.saveData = async () => {
        const name = document.getElementById('cName').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const type = document.getElementById('type').value;
        await addDoc(collection(db, "finance"), { name, amount, type, timestamp: Date.now() });
        Swal.fire('تم الحفظ', 'تم إضافة الحركة بنجاح', 'success');
        loadData();
    };

    window.deleteRow = (id) => {
        Swal.fire({ title: 'هل أنت متأكد؟', icon: 'warning', showCancelButton: true, confirmButtonText: 'نعم، احذف', cancelButtonText: 'إلغاء' })
        .then(async (r) => { if(r.isConfirmed) { await deleteDoc(doc(db, "finance", id)); loadData(); } });
    };

    window.exportExcel = () => {
        let url = 'data:application/vnd.ms-excel,' + encodeURIComponent(document.getElementById("financeTable").outerHTML);
        let link = document.createElement("a");
        link.download = "سجل_المؤسسة.xls"; link.href = url; link.click();
    };

    async function loadData() {
        const snap = await getDocs(collection(db, "finance"));
        let docs = [], inT = 0, outT = 0;
        snap.forEach(d => {
            const data = d.data();
            docs.push({ id: d.id, ...data });
            if(data.type === 'in') inT += data.amount; else outT += data.amount;
        });
        docs.sort((a,b) => b.timestamp - a.timestamp);

        const ctx = document.getElementById('myChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['وارد', 'صادر'], datasets: [{ data: [inT, outT], backgroundColor: ['#27ae60', '#e74c3c'] }] } });

        document.getElementById('balance').innerText = `الرصيد: ${inT - outT}`;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        docs.forEach(d => {
            tbody.innerHTML += `<tr><td>${d.name}</td><td>${d.amount}</td><td>${d.type}</td><td><button class="btn btn-del" onclick="deleteRow('${d.id}')">حذف</button></td></tr>`;
        });
    }
</script>
</body>
</html>
