<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناس للناس - لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        .btn { padding: 12px 30px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #app { display: none; }
        footer { margin-top: 20px; font-size: 0.9em; color: #555; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>الناس للناس</h1>
        <p>لوحة تحكم الإدارة</p>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="login()">دخول</button>
    </div>

    <div id="app" class="card">
        <h1>تم الدخول بنجاح!</h1>
        <div style="background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 15px;">
            <p><strong>رئيس مجلس الإدارة:</strong> الأستاذ/ شعبان عبد الفضيل</p>
        </div>
        <footer>
            <p>تطوير: حسن الدربي</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
            authDomain: "al-nas-lil-nas.firebaseapp.com",
            projectId: "al-nas-lil-nas",
            storageBucket: "al-nas-lil-nas.firebasestorage.app",
            messagingSenderId: "134740212500",
            appId: "1:134740212500:web:af95ff96b87bd6b2f66001"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        window.login = async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            
            try {
                const q = query(collection(db, "users"), where("username", "==", u), where("password", "==", p));
                const querySnapshot = await getDocs(q);

                if (!querySnapshot.empty) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                } else {
                    alert("بيانات خاطئة! يرجى التأكد من اسم المستخدم وكلمة المرور.");
                }
            } catch (e) {
                alert("حدث خطأ في الاتصال. تأكد من اتصال الإنترنت.");
            }
        };
    </script>
</body>
</html>
