<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناس للناس - لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: #f8f9fa; }
        #loginScreen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        #app { display: none; display: flex; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%); color: white; height: 100vh; padding: 25px; text-align: center; }
        .main-content { padding: 40px; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background-color: #2c3e50; color: white; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        .btn { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        .admin-info { margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="username" placeholder="اسم المستخدم"><br><br>
            <input type="password" id="password" placeholder="كلمة المرور"><br><br>
            <button class="btn" onclick="checkLogin()">دخول</button>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <h3>الناس للناس</h3>
            <div class="admin-info">
                <p>رئيس مجلس الإدارة</p>
                <strong>الأستاذ/ شعبان عبد الفضيل</strong>
            </div>
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-top: 20px;">
                <p>الحالات المكتملة:</p>
                <h1 id="completedCount">0</h1>
            </div>
        </div>
        <div class="main-content">
            <h1>لوحة تحكم المدير</h1>
            <input type="text" id="taskInput" placeholder="اسم الحالة...">
            <button class="btn" onclick="addTask()">إضافة حالة</button>
            <table id="taskTable">
                <thead><tr><th>الاسم</th><th>التاريخ</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
                <tbody></tbody>
            </table>
            <footer style="margin-top: 50px; text-align: center; color: #7f8c8d;">
                تم التطوير بواسطة: <strong>حسن الدربي</strong>
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
            authDomain: "al-nas-lil-nas.firebaseapp.com",
            projectId: "al-nas-lil-nas",
            storageBucket: "al-nas-lil-nas.firebasestorage.app",
            messagingSenderId: "134740212500",
            appId: "1:134740212500:web:af95ff96b87bd6b2f66001",
            measurementId: "G-CSNPBRW7T6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.checkLogin = () => {
            if(document.getElementById('username').value === 'admin' && document.getElementById('password').value === '1234') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
            } else { alert("بيانات دخول خاطئة!"); }
        };

        window.addTask = async () => {
            let val = document.getElementById('taskInput').value;
            if(!val) return;
            await addDoc(collection(db, "tasks"), { name: val, date: new Date().toLocaleDateString('ar-EG'), status: "قيد الانتظار" });
            document.getElementById('taskInput').value = "";
        };

        window.deleteTask = async (id) => { await deleteDoc(doc(db, "tasks", id)); };

        window.updateStatus = async (id, newStatus) => { await updateDoc(doc(db, "tasks", id), { status: newStatus }); };

        onSnapshot(collection(db, "tasks"), (snapshot) => {
            let tbody = document.querySelector("#taskTable tbody");
            let count = 0;
            tbody.innerHTML = "";
            snapshot.forEach((doc) => {
                let d = doc.data();
                if(d.status === 'مكتمل') count++;
                tbody.innerHTML += `<tr>
                    <td>${d.name}</td><td>${d.date}</td>
                    <td><select onchange="updateStatus('${doc.id}', this.value)">
                        <option ${d.status==='قيد الانتظار'?'selected':''}>قيد الانتظار</option>
                        <option ${d.status==='مكتمل'?'selected':''}>مكتمل</option>
                    </select></td>
                    <td><button onclick="deleteTask('${doc.id}')" style="background:none; border:none; cursor:pointer;">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('completedCount').innerText = count;
        });
    </script>
</body>
</html>
