<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الناس للناس - لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8f9fa; margin: 0; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: #27ae60; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 80%; }
    </style>
</head>
<body>

    <div id="loginScreen" class="box">
        <h1 style="color: #2c3e50;">الناس للناس</h1>
        <h2>تسجيل الدخول</h2>
        <input type="text" id="user" placeholder="اسم المستخدم"><br>
        <input type="password" id="pass" placeholder="كلمة المرور"><br>
        <button class="btn" onclick="login()">دخول</button>
    </div>

    <div id="app" style="display:none;">
        <div class="box">
            <h1>الناس للناس</h1>
            <h3>رئيس مجلس الإدارة: الأستاذ/ شعبان عبد الفضيل</h3>
        </div>

        <div class="box">
            <h3>إضافة مستخدم جديد</h3>
            <input type="text" id="newU" placeholder="اسم المستخدم الجديد">
            <input type="password" id="newP" placeholder="كلمة المرور">
            <button class="btn" style="background:#34495e;" onclick="saveUser()">حفظ مستخدم جديد</button>
        </div>

        <div class="box">
            <h3>إضافة حالة جديدة</h3>
            <input type="text" id="taskInput" placeholder="اسم الحالة">
            <button class="btn" onclick="addTask()">إضافة</button>
        </div>
        
        <footer style="text-align:center; margin-top: 30px;">
            <p>تم التطوير بواسطة: <strong>حسن الدربي</strong></p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
            authDomain: "al-nas-lil-nas.firebaseapp.com",
            projectId: "al-nas-lil-nas",
            storageBucket: "al-nas-lil-nas.firebasestorage.app",
            messagingSenderId: "134740212500",
            appId: "1:134740212500:web:af95ff96b87bd6b2f66001"
        }));

        window.login = async () => {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const q = query(collection(db, "users"), where("username", "==", u), where("password", "==", p));
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else { alert("بيانات خاطئة!"); }
        };

        window.saveUser = async () => {
            await addDoc(collection(db, "users"), { username: document.getElementById('newU').value, password: document.getElementById('newP').value });
            alert("تم حفظ المستخدم الجديد!");
        };

        window.addTask = () => {
            addDoc(collection(db, "tasks"), { name: document.getElementById('taskInput').value, status: "قيد الانتظار" });
        };
    </script>
</body>
</html>
