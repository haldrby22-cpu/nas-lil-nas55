<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناس للناس - لوحة الإدارة</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        .btn { padding: 10px 20px; cursor: pointer; }
        #app { display: none; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>تسجيل الدخول</h1>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="login()">دخول</button>
    </div>

    <div id="app" class="card">
        <h1>تم الدخول بنجاح!</h1>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCdEd_xy-BBtxRm8CmIRyS1Ublr-Kp5fAQ",
            authDomain: "al-nas-lil-nas.firebaseapp.com",
            projectId: "al-nas-lil-nas",
            storageBucket: "al-nas-lil-nas.firebasestorage.app",
            messagingSenderId: "134740212500",
            appId: "1:134740212500:web:af95ff96b87bd6b2f66001"
        }));

        window.login = async () => {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            
            // هنا الكود يبحث عن 'username' و 'password' (بحروف صغيرة)
            const q = query(collection(db, "users"), where("username", "==", u), where("password", "==", p));
            const snapshot = await getDocs(q);
            
            if (!snapshot.empty) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
            } else {
                alert("بيانات خاطئة! تأكد أن الحقول في Firebase هي username و password بحروف صغيرة.");
            }
        };
    </script>
</body>
</html>
